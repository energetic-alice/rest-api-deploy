# Ignored when autoscaling.enabled=true - serves as initial count before HPA enabled
replicaCount: 3

# Starting values — calibrate after 1-2 weeks in prod
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

ingress:
  enabled: true
  annotations:
    # Rate limiting — calibrate for real traffic
    nginx.ingress.kubernetes.io/rate-limit-rps: "50"
    nginx.ingress.kubernetes.io/rate-limit-burst-multiplier: "5"
  hosts:
    - host: api.example.com
      paths:
        - path: /
          pathType: Prefix

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  # Memory scaling added because REST APIs can hit memory limits before CPU
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: "30%"

podAntiAffinity:
  enabled: true

topologySpread:
  enabled: true

serviceMonitor:
  enabled: true

prometheusRule:
  enabled: true
