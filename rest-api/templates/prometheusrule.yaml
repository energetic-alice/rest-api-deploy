{{- if .Values.prometheusRule.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "rest-api.fullname" . }}
  labels:
    {{- include "rest-api.labels" . | nindent 4 }}
spec:
  groups:
    - name: {{ include "rest-api.fullname" . }}
      rules:
        # Availability (pod health)
        - alert: PodDown
          expr: |
            kube_deployment_status_replicas_available{namespace="{{ .Release.Namespace }}", deployment="{{ include "rest-api.fullname" . }}"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "All replicas of {{ include "rest-api.fullname" . }} are down"
            description: "Deployment has 0 available replicas for more than 5 minutes"
        - alert: PodNotReady
          expr: |
            kube_pod_status_ready{namespace="{{ .Release.Namespace }}", pod=~"{{ include "rest-api.fullname" . }}.*", condition="true"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ "{{" }} $labels.pod {{ "}}" }} is not ready"
            description: "Pod is running but failing readiness checks for more than 5 minutes"
        - alert: PodPending
          expr: |
            kube_pod_status_phase{namespace="{{ .Release.Namespace }}", pod=~"{{ include "rest-api.fullname" . }}.*", phase="Pending"} == 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ "{{" }} $labels.pod {{ "}}" }} is stuck in Pending"
            description: "Pod has been in Pending state for more than 10 minutes — check node resources and scheduling constraints"
        - alert: HighRestartCount
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace="{{ .Release.Namespace }}", pod=~"{{ include "rest-api.fullname" . }}.*"}[15m]) > {{ .Values.prometheusRule.thresholds.restartCount }}
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ "{{" }} $labels.pod {{ "}}" }} is restarting frequently"
            description: "More than {{ .Values.prometheusRule.thresholds.restartCount }} restarts in the last 15 minutes"
        # Resources utilization
        - alert: HighCPUUsage
          expr: |
            sum by (pod) (rate(container_cpu_usage_seconds_total{namespace="{{ .Release.Namespace }}", pod=~"{{ include "rest-api.fullname" . }}.*", container="{{ .Chart.Name }}"}[5m]))
            /
            sum by (pod) (kube_pod_container_resource_limits{namespace="{{ .Release.Namespace }}", pod=~"{{ include "rest-api.fullname" . }}.*", container="{{ .Chart.Name }}", resource="cpu"})
            > {{ .Values.prometheusRule.thresholds.cpuUsage }}
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage on {{ "{{" }} $labels.pod {{ "}}" }}"
            description: "CPU usage is above {{ mul (int (mulf .Values.prometheusRule.thresholds.cpuUsage 100)) }}% of the limit"
        - alert: HighMemoryUsage
          expr: |
            container_memory_working_set_bytes{namespace="{{ .Release.Namespace }}", pod=~"{{ include "rest-api.fullname" . }}.*", container="{{ .Chart.Name }}"} / container_spec_memory_limit_bytes > {{ .Values.prometheusRule.thresholds.memoryUsage }}
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High memory usage on {{ "{{" }} $labels.pod {{ "}}" }}"
            description: "Memory usage is above {{ mul (int (mulf .Values.prometheusRule.thresholds.memoryUsage 100)) }}% of the limit"
        # Traffic (RED method — rate, errors, duration)
        - alert: HighErrorRate
          expr: |
            sum(rate(http_request_duration_seconds_count{namespace="{{ .Release.Namespace }}", pod=~"{{ include "rest-api.fullname" . }}.*", status=~"5.."}[5m]))
            /
            sum(rate(http_request_duration_seconds_count{namespace="{{ .Release.Namespace }}", pod=~"{{ include "rest-api.fullname" . }}.*"}[5m]))
            > {{ .Values.prometheusRule.thresholds.errorRate }}
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "High error rate on {{ include "rest-api.fullname" . }}"
            description: "More than {{ mul (int (mulf .Values.prometheusRule.thresholds.errorRate 100)) }}% of requests returned 5xx for 5 minutes"
        - alert: HighLatencyP99
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket{namespace="{{ .Release.Namespace }}", pod=~"{{ include "rest-api.fullname" . }}.*"}[5m])) by (le)
            ) > {{ .Values.prometheusRule.thresholds.latencyP99 }}
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "High p99 latency on {{ include "rest-api.fullname" . }}"
            description: "99th percentile latency is above {{ .Values.prometheusRule.thresholds.latencyP99 }}s for 5 minutes"
        - alert: HighLatencyP95
          expr: |
            histogram_quantile(0.95,
              sum(rate(http_request_duration_seconds_bucket{namespace="{{ .Release.Namespace }}", pod=~"{{ include "rest-api.fullname" . }}.*"}[5m])) by (le)
            ) > {{ .Values.prometheusRule.thresholds.latencyP95 }}
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High p95 latency on {{ include "rest-api.fullname" . }}"
            description: "95th percentile latency is above {{ .Values.prometheusRule.thresholds.latencyP95 }}s for 5 minutes"
        - alert: HighTrafficRate
          expr: |
            sum(rate(http_request_duration_seconds_count{namespace="{{ .Release.Namespace }}", pod=~"{{ include "rest-api.fullname" . }}.*"}[5m])) > {{ .Values.prometheusRule.thresholds.maxRequestRate }}
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Abnormally high traffic on {{ include "rest-api.fullname" . }}"
            description: "Request rate exceeded {{ .Values.prometheusRule.thresholds.maxRequestRate }} rps for 5 minutes — possible DDoS, bot attack, or client retry storm"
        - alert: LowTrafficRate
          expr: |
            sum(rate(http_request_duration_seconds_count{namespace="{{ .Release.Namespace }}", pod=~"{{ include "rest-api.fullname" . }}.*"}[5m])) < {{ .Values.prometheusRule.thresholds.minRequestRate }}
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Abnormally low traffic on {{ include "rest-api.fullname" . }}"
            description: "Request rate dropped below {{ .Values.prometheusRule.thresholds.minRequestRate }} rps for 30 minutes — possible upstream or routing issue"
{{- end }}
