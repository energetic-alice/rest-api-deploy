apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "rest-api.fullname" . }}-test"
  labels:
    {{- include "rest-api.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.12.1
      command: ["curl", "--fail", "--silent", "--max-time", "5"]
      args:
        - "http://{{ include "rest-api.fullname" . }}:{{ .Values.service.port }}/healthz"
